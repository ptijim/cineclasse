<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendrier cinéma</title>
<style>
body{margin:0;padding:12px;background:#020617;color:white;font-family:Arial;height:100vh;overflow:hidden;box-sizing:border-box}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;height:52px}
button{background:#1e293b;color:white;border:none;padding:12px 18px;border-radius:12px;cursor:pointer}
#monthTitle{}
.calendar{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;height:calc(100vh - 90px)}
.week{text-align:center;font-weight:700;opacity:.7;padding:4px;font-size:12px}
.cell{aspect-ratio:1/1.05;border-radius:14px;background:#111827;position:relative;overflow:hidden;min-height:0}
.empty{background:transparent}
.poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.96),rgba(0,0,0,.1));display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.daynum{position:absolute;top:5px;right:7px;font-size:16px;font-weight:900;z-index:2}
.hidden{display:none}
#detail{position:fixed;inset:0;background:#020617;padding:16px;overflow:hidden;z-index:50;height:100vh;box-sizing:border-box}
.detail{display:grid;grid-template-columns:300px 1fr;grid-template-rows:minmax(0,1fr) auto;gap:18px 24px;height:calc(100vh - 90px);align-items:start;overflow:auto}
.info{height:100%;overflow:auto;padding-right:8px}
.big{width:100%;max-width:300px;max-height:82vh;object-fit:contain;border-radius:20px}
iframe{width:100%;height:auto;min-height:220px;max-height:38vh;aspect-ratio:16/9;border:none;border-radius:20px;background:black}
.videoBox,.questionsBox{background:#0f172a;border:1px solid #334155;border-radius:14px;padding:12px;margin:12px 0}
.boxTitle{font-weight:900;margin-bottom:8px}
.emptyMessage{opacity:.72}
.videoLink{display:inline-block;color:white;background:#1e293b;text-decoration:none;border-radius:10px;padding:10px 12px;margin-top:10px}
.questionsBox{grid-column:1 / -1;margin:0}
.questionsText{white-space:pre-line;line-height:1.45}
</style>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="top">
<button onclick="prevMonth()">⬅</button>
<div style="text-align:center">
<div style="font-size:44px;font-weight:900;line-height:1">
Ciné’Classe
</div>
<div id="monthTitle" style="font-size:22px;font-weight:700;opacity:.85;margin-top:4px"></div>
</div>
<button onclick="nextMonth()">➡</button>
</div>

<div id="loading"
style="
display:flex;
align-items:center;
justify-content:center;
height:70vh;
font-size:32px;
font-weight:900;
letter-spacing:.5px;
">
Veuillez patienter
</div><div id="calendar" style="content-visibility:auto"></div>

<div id="detail" class="hidden">
<button onclick="closeDetail()">⬅ Retour</button>
<div class="detail" style="margin-top:20px">
<div><img id="bigposter" class="big"></div>
<div class="info">
<h1 id="d_title" style="margin-top:0;margin-bottom:12px;font-size:2rem"></h1>
<div class="videoBox">
<iframe id="player" allowfullscreen></iframe>
<div id="d_video_msg" class="emptyMessage hidden">Aucune vidéo renseignée pour ce film.</div>
<a id="videoLink" class="videoLink hidden" href="#" target="_blank" rel="noopener">Ouvrir la vidéo</a>
</div>
<p><b>Réalisateur :</b> <span id="d_director"></span></p>
<p><b>Pays :</b> <span id="d_country"></span></p>
<p><b>Année :</b> <span id="d_year"></span></p>
<p><b>Durée :</b> <span id="d_runtime"></span></p>
<p><b>Genres :</b> <span id="d_genre"></span></p>
<p><b>Synopsis :</b></p><p id="d_plot"></p>
</div>
<div id="questionsBox" class="questionsBox hidden">
<div class="boxTitle">Questions</div>
<div id="d_questions" class="questionsText"></div>
</div>
</div>
</div>

<script>
let DATA = [];
const TMDB='fc2817c759c1e767bf6745c22ff51ff9';
const OMDB='2a82f8f4';


const movieCache = JSON.parse(localStorage.getItem('cineclasse_cache') || '{}');

function saveCache(){
localStorage.setItem('cineclasse_cache', JSON.stringify(movieCache));
}

const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let grouped={};
let keys=[];
let current=0;

const GENRES={
'Action':'Action',
'Adventure':'Aventure',
'Animation':'Animation',
'Biography':'Biographie',
'Comedy':'Comédie',
'Crime':'Policier',
'Documentary':'Documentaire',
'Drama':'Drame',
'Family':'Famille',
'Fantasy':'Fantastique',
'History':'Histoire',
'Horror':'Horreur',
'Music':'Musique',
'Mystery':'Mystère',
'Romance':'Romance',
'Sci-Fi':'Science-fiction',
'Sport':'Sport',
'Thriller':'Thriller',
'War':'Guerre',
'Western':'Western'
};

function translateGenres(g){
 return String(g||'').split(',').map(x=>GENRES[x.trim()]||x.trim()).join(', ');
}

function parseFR(s){
 if(!s) return null;
 const p=String(s).split('/');
 if(p.length!==3) return null;
 return new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
}

function imdbId(url){
 const m=String(url||'').match(/tt\d+/);
 return m?m[0]:null;
}

function normalizeKey(s){
 return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
}

function cell(row, names){
 const wanted=names.map(normalizeKey);
 for(const key of Object.keys(row)){
   if(wanted.includes(normalizeKey(key))) return row[key] || '';
 }
 return '';
}

function yt(url){
 try{
   const u=new URL(url);
   if(u.hostname.includes('youtu.be')) return u.pathname.split('/').filter(Boolean)[0] || '';
   if(u.pathname.includes('/embed/')) return u.pathname.split('/embed/')[1].split('/')[0];
   if(u.pathname.includes('/shorts/')) return u.pathname.split('/shorts/')[1].split('/')[0];
   return u.searchParams.get('v') || '';
 }catch(e){return '';}
}


async function translate(text){

if(!text || text==='N/A') return '';

try{

const r = await fetch(
'https://api.mymemory.translated.net/get?q=' +
encodeURIComponent(text) +
'&langpair=en|fr'
);

const d = await r.json();

return d.responseData.translatedText || text;

}catch(e){

return text;

}

}

async function fetchTMDB(imdb){

 if(movieCache['tmdb_'+imdb]){
    return movieCache['tmdb_'+imdb];
 }

 try{
   const r=await fetch(`https://api.themoviedb.org/3/find/${imdb}?api_key=${TMDB}&external_source=imdb_id&language=fr-FR`);
   const d=await r.json();
   if(d.movie_results && d.movie_results.length){
      const m=d.movie_results[0];
      const result = {
       title:m.title || '',
       plot:m.overview || '',
       year:(m.release_date||'').slice(0,4),
       poster:m.poster_path ? 'https://image.tmdb.org/t/p/w500'+m.poster_path : ''
      };

      movieCache['tmdb_'+imdb] = result;
      saveCache();

      return result;
   }
 }catch(e){}
 return {};
}

async function fetchOMDB(imdb){

 if(movieCache['omdb_'+imdb]){
    return movieCache['omdb_'+imdb];
 }

 try{
   const r=await fetch(`https://www.omdbapi.com/?apikey=${OMDB}&i=${imdb}&plot=full`);
   const result = await r.json();

   movieCache['omdb_'+imdb] = result;
   saveCache();

   return result;
 }catch(e){}
 return {};
}

function closeDetail(){
 document.getElementById('detail').classList.add('hidden');
 document.getElementById('player').src='';
 document.getElementById('d_video_msg').classList.add('hidden');
 document.getElementById('videoLink').classList.add('hidden');
}

function openFilm(f){
 document.getElementById('detail').classList.remove('hidden');
 document.getElementById('d_title').textContent=f.title||'';
 document.getElementById('d_director').textContent=f.director||'';
 document.getElementById('d_country').textContent=f.country||'';
 document.getElementById('d_year').textContent=f.year||'';
 document.getElementById('d_runtime').textContent=f.runtime||'';
 document.getElementById('d_genre').textContent=f.genre||'';
 document.getElementById('d_plot').textContent=f.plot||'';
 document.getElementById('bigposter').src=f.poster||'';

 const player=document.getElementById('player');
 const videoMsg=document.getElementById('d_video_msg');
 const videoLink=document.getElementById('videoLink');
 const id=yt(f.youtube);
 if(id){
   player.style.display='block';
   player.src='https://www.youtube-nocookie.com/embed/'+id;
   videoLink.href=f.youtube;
   videoLink.classList.remove('hidden');
   videoMsg.classList.add('hidden');
 } else {
   player.src='';
   player.style.display='none';
   videoLink.href='#';
   videoLink.classList.add('hidden');
   videoMsg.classList.remove('hidden');
 }

 const questions=String(f.questions||'').trim();
 document.getElementById('d_questions').textContent=questions;
 document.getElementById('questionsBox').classList.toggle('hidden', !questions);
}

function render(){

document.getElementById('loading').style.display='none';

 const key=keys[current];
 const films=grouped[key];
 document.getElementById('monthTitle').textContent=key;

 const cal=document.getElementById('calendar');
 cal.innerHTML='';

 const grid=document.createElement('div');
 grid.className='calendar';

 ['Lun','Mar','Mer','Jeu','Ven'].forEach(w=>{
   const e=document.createElement('div');
   e.className='week';
   e.textContent=w;
   grid.appendChild(e);
 });

 const firstDay = new Date(films.year, films.month, 1);
 let start = firstDay.getDay();
 start = start === 0 ? 6 : start - 1;

 const daysInMonth = new Date(films.year, films.month+1, 0).getDate();

 const map={};
 films.items.forEach(f=>map[f.day]=f);

 if(start>4){
    start=0;
 }

 for(let i=0;i<start;i++){
   const e=document.createElement('div');
   e.className='cell empty';
   grid.appendChild(e);
 }

 for(let d=1; d<=daysInMonth; d++){

   const testDate = new Date(films.year, films.month, d);

   const weekday = testDate.getDay();

   // ignorer samedi(6) et dimanche(0)
   if(weekday===0 || weekday===6){
      continue;
   }

   const f=map[d];

   const c=document.createElement('div');
   c.className='cell';

   if(f){
      if(f.poster){
         c.innerHTML=`
         <img class="poster" src="${f.poster}">
         <div class="daynum">${d}</div>
         <div class="overlay">
         <div style="font-weight:700;font-size:11px;line-height:1.1">${f.title}</div>
         </div>`;
      } else {
         c.innerHTML=`<div class="daynum">${d}</div>`;
      }

      c.onclick=()=>openFilm(f);

   } else {
      c.innerHTML=`<div class="daynum">${d}</div>`;
   }

   grid.appendChild(c);
 }

 cal.appendChild(grid);
}

function prevMonth(){ if(current>0){ current--; render(); } }
function nextMonth(){ if(current<keys.length-1){ current++; render(); } }

function buildBaseFilm(row){
   const d=parseFR(cell(row,['date']));
   if(!d) return null;

   const imdb=imdbId(cell(row,['imdb']));

   return {
      row:row,
      imdb:imdb,
      monthName:MONTHS[d.getMonth()]+' '+d.getFullYear(),
      month:d.getMonth(),
      year:d.getFullYear(),
      film:{
         day:d.getDate(),
         title:cell(row,['titre','title']) || '',
         director:cell(row,['réalisateur','realisateur','director'])||'',
         country:cell(row,['pays','country'])||'',
         year:cell(row,['année','annee','year']) || '',
         runtime:cell(row,['durée','duree','runtime'])||'',
         genre:cell(row,['genres','genre'])||'',
         plot:cell(row,['synopsis','plot'])||'',
         poster:cell(row,['adresse affiche','affiche','poster']) || '',
         youtube:cell(row,['youtube','video','bande annonce','bande-annonce','trailer']) || '',
         questions:cell(row,['questions','question']) || ''
      }
   };
}

async function enrichFilm(item){
   const row=item.row;
   const imdb=item.imdb;

   let tmdb={};
   let omdb={};

   if(!imdb) return;

   [tmdb, omdb]=await Promise.all([
      fetchTMDB(imdb),
      fetchOMDB(imdb)
   ]);

   const [director, country, genre, translatedPlot] = await Promise.all([
      (omdb.Director && omdb.Director!=='N/A')
         ? translate(omdb.Director)
         : Promise.resolve(cell(row,['réalisateur','realisateur','director'])||''),
      (omdb.Country && omdb.Country!=='N/A')
         ? translate(omdb.Country)
         : Promise.resolve(cell(row,['pays','country'])||''),
      (omdb.Genre && omdb.Genre!=='N/A')
         ? translate(translateGenres(omdb.Genre))
         : Promise.resolve(cell(row,['genres','genre'])||''),
      (!tmdb.plot && omdb.Plot && omdb.Plot!=='N/A')
         ? translate(omdb.Plot)
         : Promise.resolve('')
   ]);

   Object.assign(item.film,{
      title:tmdb.title || omdb.Title || cell(row,['titre','title']) || '',
      director:director,
      country:country,
      year:tmdb.year || omdb.Year || cell(row,['année','annee','year']) || '',
      runtime:(omdb.Runtime && omdb.Runtime!=='N/A') ? omdb.Runtime : (cell(row,['durée','duree','runtime'])||''),
      genre:genre,
      plot:tmdb.plot || translatedPlot || cell(row,['synopsis','plot']) || '',
      poster:tmdb.poster || cell(row,['adresse affiche','affiche','poster']) || ''
   });
}

async function init(){
 const films=DATA.map(buildBaseFilm).filter(Boolean);

 films.forEach(item=>{
   if(!grouped[item.monthName]){
      grouped[item.monthName]={
         month:item.month,
         year:item.year,
         items:[]
      };
   }

   grouped[item.monthName].items.push(item.film);
 });

 keys=Object.keys(grouped).sort((a,b)=>{
   return new Date(grouped[a].year, grouped[a].month) - new Date(grouped[b].year, grouped[b].month);
 });

 const now=new Date();
 const currentName=MONTHS[now.getMonth()]+' '+now.getFullYear();
 const idx=keys.indexOf(currentName);

 if(idx>=0) current=idx;

 render();

 Promise.all(films.map(enrichFilm)).then(render);
}


async function loadExcel(){

 document.getElementById('loading').style.display='flex';

 const response = await fetch('./film.xlsx?ts=' + Date.now());

 const buffer = await response.arrayBuffer();

 const workbook = XLSX.read(buffer,{type:'array'});

 const sheet = workbook.Sheets[workbook.SheetNames[0]];

 DATA = XLSX.utils.sheet_to_json(sheet,{defval:''});

 grouped={};
 keys=[];

 await init();

}

loadExcel();

</script>
</body>
</html>
